<!DOCTYPE html>
<html>
<head>
    <title>Get DiskBar Pro</title>
</head>
<body>
    <h2>Get Your Free DiskBar License</h2>
    <form id="checkoutForm">
        <input type="text" id="name" placeholder="Full Name" required><br><br>
        <input type="email" id="email" placeholder="Email Address" required><br><br>
        <input type="text" id="country" placeholder="Country" required><br><br>
        <input type="text" id="state" placeholder="State/Province" required><br><br>
        <input type="text" id="pincode" placeholder="Pin Code" required><br><br>
        <button type="submit">Purchase ($0.00)</button>
    </form>
    <p id="message"></p>

    <script>
        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop the page from reloading
            
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            // Gather the data
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                country: document.getElementById('country').value,
                state: document.getElementById('state').value,
                pin_code: document.getElementById('pincode').value
            };

            // Send data to your Supabase Edge Function
            try {
                const response = await fetch('https://YOUR_SUPABASE_PROJECT.supabase.co/functions/v1/generate-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                if (response.ok) {
                    document.getElementById('message').innerText = "Success! Please check your email for your License Key.";
                    e.target.reset();
                } else {
                    document.getElementById('message').innerText = "Something went wrong. Please try again.";
                }
            } catch (err) {
                console.error(err);
            } finally {
                submitBtn.innerText = "Purchase ($0.00)";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
